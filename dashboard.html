<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Leejolt Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-require-auth>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="auth-brand">
        <span class="brand-mark">LJ</span>
        <span class="brand-name">Leejolt Panel</span>
      </div>
      <a class="nav-link active" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="orders.html">Orders</a>
      <a class="nav-link" href="wallet.html">Wallet</a>
      <a class="nav-link" href="profile.html">Profile</a>
      <a class="nav-link" href="#" data-logout>Sign out</a>
    </aside>

    <main class="main-content">
      <h1 class="page-title">Welcome back<span id="userNameSpan"></span></h1>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Wallet balance</div>
          <div class="stat-value" id="walletBalance">₦0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total orders</div>
          <div class="stat-value" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active orders</div>
          <div class="stat-value" id="activeOrders">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed orders</div>
          <div class="stat-value" id="completedOrders">0</div>
        </div>
      </div>

      <div class="stat-card" id="recentOrdersCard">
        <div class="stat-label" style="margin-bottom: 14px;">Recent orders</div>
        <div id="recentOrdersList" style="color: var(--text-muted); font-size: 14px;">
          No orders yet. <a href="orders.html">Place your first order</a>.
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
